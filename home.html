    <style>
        /* Pinterest-style Grid CSS */
        .photo-grid {
            column-count: 3; /* Number of columns */
            column-gap: 15px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .photo-item {
            display: inline-block; /* Crucial for Pinterest layout */
            width: 100%;
            margin-bottom: 15px;
            background: #f4f4f4;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .photo-item:hover {
            transform: scale(1.02);
        }

        .photo-item img {
            width: 100%;
            display: block;
            border-radius: 12px;
        }

        @media (max-width: 768px) {
            .photo-grid { column-count: 2; }
        }
    </style>

  <script>
    // 1. DATA STASHES
    const allOutfits = [
        'image/model1.jpg', 'image/model2.jpg', 'image/model3.jpg', 
        'image/model4.jpg', 'image/model5.jpg', 'image/model6.jpg',
        'image/model7.jpg', 'image/model8.jpg', 'image/model9.jpg', 
        'image/model10.jpg', 'image/model11.jpg', 'image/model12.jpg', 
        'image/model13.jpg', 'image/model14.jpg', 'image/model15.jpg', 
        'image/model16.jpg', 'image/model17.jpg', 'image/model18.jpg',
        'image/model19.jpg', 'image/model20.jpg', 'image/model21.jpg', 
        'image/model22.jpg', 'image/model23.jpg', 'image/model24.jpg',
        'image/model25.jpg', 'image/model26.jpg', 'image/model27.jpg'
    ];

    const categoryStashes = {
        'Casual': ['image/casual1.jpg', 'image/casual2.jpg', 'image/casual3.jpg', 'image/casual4.jpg', 'image/casual5.jpg'],
        'School': ['image/school1.jpg', 'image/school2.jpg', 'image/school3.jpg', 'image/school4.jpg','image/school1.jpg', 'image/school2.jpg', 'image/school3.jpg', 'image/school4.jpg'],
        'Coquette': ['image/coquette1.jpg', 'image/coquette2.jpg', 'image/coquette3.jpg', 'image/coquette4.jpg','image/coquette5.jpg', 'image/coquette6.jpg', 'image/coquette7.jpg', 'image/coquette8.jpg'],
        'College': ['image/college1.jpg', 'image/college2.jpg', 'image/college3.jpg', 'image/college4.jpg', 'image/college5.jpg', 'image/college6.jpg'],
        'Formal': ['image/formal1.jpg', 'image/formal2.jpg', 'image/formal3.jpg', 'image/formal4.jpg', 'image/formal5.jpg'],
        'Streetwear': ['image/street1.jpg', 'image/street2.jpg', 'image/street3.jpg', 'image/street4.jpg', 'image/street5.jpg', 'image/street6.jpg', 'image/street7.jpg', 'image/street8.jpg', 'image/street9.jpg']
    };

    let availableOutfits = [...allOutfits]; 
    let currentTab = 'For You';
    const batchSize = 7;

    // Standard Shuffle Logic
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // Helper to put images on screen
    function renderGrid(photoList) {
        const grid = document.querySelector('.photo-grid');
        if (!grid) return;
        grid.innerHTML = ''; 
        photoList.forEach(src => {
            const item = document.createElement('div');
            item.className = 'photo-item';
            // Added a fallback placeholder if the image file is missing
            item.innerHTML = `<img src="${src}" alt="Outfit" onerror="this.src='https://via.placeholder.com'">`;
            grid.appendChild(item);
        });
    }

    // Load "For You" Logic (Splicing batch)
    function loadForYou() {
        if (availableOutfits.length < batchSize) availableOutfits = [...allOutfits];
        shuffleArray(availableOutfits);
        const currentBatch = availableOutfits.splice(0, batchSize);
        renderGrid(currentBatch);
    }

    // Switch Tabs
    function switchCategory(category, element) {
        currentTab = category;
        document.querySelectorAll('.cat-pill').forEach(pill => pill.classList.remove('active'));
        element.classList.add('active');

        if (category === 'For You') {
            loadForYou();
        } else {
            // Show category images immediately (shuffled)
            const photos = [...(categoryStashes[category] || [])];
            renderGrid(shuffleArray(photos));
        }
    }

    // ECO SHUFFLE: Works for EVERY category
    function shuffleOutfit() {
        if (currentTab === 'For You') {
            loadForYou();
        } else {
            const photos = [...(categoryStashes[currentTab] || [])];
            renderGrid(shuffleArray(photos));
        }
    }

    // ESP32 Connection
    const robotIP = "http://192.168.1.XX"; 
    function checkRobotCommand() {
        fetch(robotIP + "/status")
            .then(r => r.text())
            .then(data => { if (data === "BUTTON_PRESSED") shuffleOutfit(); })
            .catch(e => {});
    }

    window.onload = loadForYou;
    setInterval(checkRobotCommand, 1000);
</script>
