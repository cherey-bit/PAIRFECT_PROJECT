<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pairfect | Login</title>
    <!-- Standard CSS Links -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-page">

<!-- ── Left Hero Section ── -->
<div class="login-hero">
    <!-- Background Image -->
    <img src="image/login.background.png" alt="Fashion Backdrop" style="width:100%; height:100%; object-fit:cover;">
    <div class="login-hero-overlay"></div>

    <!-- Vertical PAIRFECT Lettering -->
    <div class="brand-vert">
        <span>P</span>
        <span class="outline">A</span>
        <span>I</span>
        <span class="outline">R</span>
        <span>F</span>
        <span class="outline">E</span>
        <span>C</span>
        <span class="outline">T</span>
    </div>
</div>

<!-- ── Right Login Panel ── -->
<div class="login-panel">
    <h1 class="login-tagline">Your Smart <br><em>Outfit Assistant</em></h1>

    <!-- Login Form -->
    <form class="login-form" action="home.html" method="get">
        
        <input type="text" class="login-input" placeholder="Username" required>
        <input type="password" class="login-input" placeholder="Password" required>

        <button type="submit" class="btn-login">Login</button>

        <p class="login-forgot">Forgot your style password?</p>

        <div class="login-divider">
            <hr> <span>or</span> <hr>
        </div>

        <!-- Alternative Login -->
        <button type="button" class="btn-alt">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continue with Google
</button>


        <!-- ADDED: Toggle Link for the JavaScript to work -->
        <p class="toggle-mode" style="text-align:center; margin-top:20px; font-size:0.9rem; color:#666;">
            New to Pairfect? <span id="switch-to-signup" style="cursor:pointer; text-decoration:underline; font-weight:bold; color:#000;">Create an account</span>
        </p>
    </form>
</div>

<!-- ADDED: Link to your JavaScript file -->
<!-- Custom Google Confirmation Modal -->
<div id="googleModal" class="custom-modal">
    <div class="modal-card">
        <div class="modal-icon">
            <svg viewBox="0 0 24 24" width="30" height="30">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
        </div>
        <h3>Verify Identity</h3>
        <p>Continue to Pairfect as <br><strong>style.icon@gmail.com</strong></p>
        <div class="modal-btns">
            <button id="modalCancel" class="m-btn-sec">Cancel</button>
            <button id="modalConfirm" class="m-btn-pri">Continue</button>
        </div>
    </div>
</div>

<script src="js/login.js"></script>
</body>
</html>
