<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pairfect | My Wardrobe</title>
    <link rel="stylesheet" href="css/style.css">

    <style>
        /* ── Split Screen Layout ── */
        .main-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: calc(100vh - 80px); /* Fill screen minus nav */
            overflow: hidden;
        }

        /* ── Left Side: Wardrobe (Scrollable) ── */
        .wardrobe-section {
            padding: 40px;
            overflow-y: auto;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        /* ── Right Side: Pinterest Scroll ── */
        .inspiration-section {
            padding: 40px;
            background: rgba(0,0,0,0.1);
            overflow-y: auto; /* Enables continuous scrolling */
        }

        .pin-grid {
            column-count: 2;
            column-gap: 15px;
        }

        .pin-item {
            display: inline-block;
            width: 100%;
            margin-bottom: 15px;
            border-radius: 12px;
            overflow: hidden;
        }

        .pin-item img {
            width: 100%;
            display: block;
            border-radius: 12px;
            transition: transform 0.3s;
        }

        /* ── Selection Glow ── */
        .w-cell {
            border: 3px solid transparent;
            transition: 0.3s;
            cursor: pointer;
        }
        .w-cell.selected {
            border-color: #fff;
            box-shadow: 0 0 20px #fff;
            transform: scale(0.96);
        }

        /* ── Floating Vibe Check Button ── */
        #vibeCheckBtn {
            position: fixed;
            bottom: 40px;
            left: 25%;
            transform: translateX(-50%);
            display: none; /* Only shows when clothes are picked */
            padding: 20px 50px;
            background: #fff;
            color: #0D2B6E;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            z-index: 100;
        }

        /* ── Pretty Modal ── */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 43, 110, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: #fff; color: #0D2B6E;
            padding: 60px; border-radius: 40px;
            text-align: center;
        }

        .modal-content h1 { font-family: 'Cormorant Garamond', serif; font-size: 4rem; }
    </style>
</head>

<div class="main-container">

    <div class="wardrobe-section">

        <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
            <p>+ Upload Clothes</p>
        </div>
        
        <div class="wardrobe-grid" id="wardrobeGrid">
            <!-- Add Button -->
            <div class="w-cell-empty" id="addButton" onclick="document.getElementById('fileInput').click()">
                <span>+</span>
            </div>
        </div>
    </div>

    <!-- RIGHT: CONTINUOUS PINTEREST SCROLL -->

            <!-- Images will be injected here -->
        </div>
    </div>

</div>

<!-- VIBE CHECK BUTTON -->
<button id="vibeCheckBtn" onclick="runVibeCheck()">VIBE CHECK</button>

<!-- PRETTY POP UP -->
<div class="modal-overlay" id="vibeModal">
    <div class="modal-content">
        <p>STYLE ANALYSIS COMPLETE</p>
        <h1 id="vibeResult">CASUAL</h1>
        <p id="mirrorColor">Mirror Glow: Blue</p>
        <br>
        <button onclick="closeModal()" style="padding:10px 30px; cursor:pointer;">GOT IT</button>
    </div>
</div>

<input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleUpload()">

<script>
    const mirrorIP = "http://192.168.1.XX"; 
    let selectedItems = 0;

    // 1. Logic for Upload & Selection
    function handleUpload() {
        const fileInput = document.getElementById('fileInput');
        const grid = document.getElementById('wardrobeGrid');
        const addButton = document.getElementById('addButton');

        if (fileInput.files && fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const newCell = document.createElement('div');
                newCell.className = 'w-cell';
                newCell.style.backgroundImage = `url('${e.target.result}')`;
                
                newCell.onclick = function() {
                    this.classList.toggle('selected');
                    selectedItems += this.classList.contains('selected') ? 1 : -1;
                    document.getElementById('vibeCheckBtn').style.display = selectedItems > 0 ? 'block' : 'none';
                };

                grid.insertBefore(newCell, addButton);
            };
            reader.readAsDataURL(fileInput.files[0]);
        }
    }

    // 2. The "Vibe Check" Logic (Pop Up + ESP32)
    function runVibeCheck() {
        const vibes = ["CASUAL", "CHIC", "ELEGANT"];
        const mirrorMap = {"CASUAL": "Green", "CHIC": "Yellow", "ELEGANT": "Blue"};
        const result = vibes[Math.floor(Math.random() * vibes.length)];
        
        document.getElementById('vibeResult').innerText = result;
        document.getElementById('mirrorColor').innerText = "Mirror Glow: " + mirrorMap[result];
        document.getElementById('vibeModal').style.display = 'flex';

        fetch(`${mirrorIP}/led?color=${mirrorMap[result].toLowerCase()}`).catch(e => console.log("Mirror not linked"));
    }

    function closeModal() { document.getElementById('vibeModal').style.display = 'none'; }

    // 3. Right Side: Continuous Pinterest Scroll
    // I added "images/" prefix and fixed all the missing commas
    const inspoPhotos = [
        'image/model1.jpg', 'image/model2.jpg', 'image/model3.jpg', 
        'image/model4.jpg', 'image/model5.jpg', 'image/model6.jpg',
        'image/model7.jpg', 'image/model8.jpg', 'image/model9.jpg', 
        'image/model10.jpg', 'image/model11.jpg', 'image/model12.jpg',
        'image/model13.jpg', 'image/model14.jpg', 'image/model15.jpg', 
        'image/model16.jpg', 'image/model17.jpg', 'image/model18.jpg',
        'image/model19.jpg', 'image/model20.jpg', 'image/model21.jpg', 
        'image/model22.jpg', 'image/model23.jpg', 'image/model24.jpg',
        'image/model25.jpg', 'image/model26.jpg', 'image/model27.jpg', 
        'image/model28.jpg', 'image/model29.jpg', 'image/model30.jpg',
        'image/model31.jpg', 'image/model32.jpg', 'image/model33.jpg', 
        'image/model34.jpg', 'image/model35.jpg', 'image/model36.jpg',
        'image/model37.jpg', 'image/model38.jpg', 'image/model39.jpg', 
        'image/model40.jpg', 'image/model41.jpg', 'image/model42.jpg',
        'image/model43.jpg', 'image/model44.jpg', 'image/model45.jpg', 
        'image/model46.jpg', 'image/model47.jpg', 'image/model48.jpg',
        'image/model49.jpg', 'image/model50.jpg'
    ];

    function loadInspo() {
        const inspoGrid = document.getElementById('inspoGrid');
        // Clear grid first
        inspoGrid.innerHTML = '';
        
        // Loop through and create images
        inspoPhotos.forEach(src => {
            const item = document.createElement('div');
            item.className = 'pin-item';
            item.innerHTML = `<img src="${src}" alt="Suggestion" onerror="this.parentElement.style.display='none'">`;
            inspoGrid.appendChild(item);
        });
    }

    window.onload = loadInspo;
</script>
